name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

concurrency:
  group: ci-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: /root/.npm
          key: node-${{ hashFiles('package.json') }}
          restore-keys: node-

      - name: Install dependencies
        run: npm install 

      - name: Biome check
        run: npx biome check
